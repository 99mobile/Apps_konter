<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Sparepart & Service</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            50: '#FFFBEB', 100: '#FFF3C4', 300: '#FFE066', 400: '#FFDA47',
                            500: '#FFCC00', 600: '#E6B800', 700: '#B38F00'
                        }
                    },
                    fontFamily: { heading: ['Manrope', 'Inter', 'sans-serif'] }
                }
            }
        }
    </script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts (Inter + Manrope) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Manrope:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            /* Latar Ink Gelap dengan Gradasi Kuning Halus (Brand) */
            background-color: #0E0F13;
            background-image: 
                radial-gradient(at 0% 0%, rgba(255, 204, 0, 0.12) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 204, 0, 0.08) 0px, transparent 50%);
        }
        
        /* Animasi Background Blob */
        .blob {
            position: absolute;
            filter: blur(80px);
            z-index: 0;
            opacity: 0.35;
            animation: float 10s infinite ease-in-out;
        }
        .blob-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: #FFCC00; animation-delay: 0s; }
        .blob-2 { bottom: -10%; right: -10%; width: 500px; height: 500px; background: #FFE066; animation-delay: 5s; }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(20px, 20px) scale(1.05); }
            100% { transform: translate(0, 0) scale(1); }
        }

        /* Input Autofill Fix untuk Dark Mode */
        input:-webkit-autofill,
        input:-webkit-autofill:hover, 
        input:-webkit-autofill:focus, 
        input:-webkit-autofill:active{
            -webkit-box-shadow: 0 0 0 30px #1e293b inset !important;
            -webkit-text-fill-color: white !important;
            transition: background-color 5000s ease-in-out 0s;
        }
        
        .animate-up { animation: fadeInUp 0.5s ease-out forwards; opacity: 0; transform: translateY(20px); }
        @keyframes fadeInUp { to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 relative overflow-hidden text-slate-200">

    <!-- Background Decoration -->
    <div class="blob blob-1 rounded-full"></div>
    <div class="blob blob-2 rounded-full"></div>

    <div class="w-full max-w-md relative z-10 animate-up">
        <!-- Login Card (Glass Dark Style) -->
        <div class="bg-slate-900/60 backdrop-blur-xl border border-slate-700/50 rounded-3xl shadow-2xl overflow-hidden ring-1 ring-white/10">
            
            <!-- Header -->
            <div class="pt-8 pb-6 px-8 text-center">
                <div class="inline-flex justify-center mb-6 relative">
                    <div class="absolute inset-0 bg-brand-500 blur-xl opacity-40 rounded-full"></div>
                    <div class="w-20 h-20 bg-slate-800 rounded-2xl shadow-inner border border-slate-700 flex items-center justify-center p-3 relative z-10">
                        <img src="{{ url_for('static', filename='images/' + app_setting.logo) }}" alt="Logo" class="w-full h-full object-contain" onerror="this.parentElement.innerHTML='<i class=\'fas fa-tools text-4xl text-brand-500\'></i>'">
                    </div>
                </div>
                <h1 class="text-2xl font-heading font-bold text-white tracking-tight">Selamat Datang</h1>
                <p class="text-slate-400 text-sm mt-2">Masuk untuk mengelola {{ app_setting.nama_aplikasi }}</p>
            </div>
            
            <!-- Flash Messages (Dark Mode) -->
            {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
            <div class="px-8 pb-2">
                {% for category, message in messages %}
                <div class="p-3 rounded-xl flex items-start gap-3 text-sm border shadow-sm
                    {% if category == 'success' %}bg-emerald-500/10 text-emerald-200 border-emerald-500/20
                    {% elif category == 'error' %}bg-rose-500/10 text-rose-200 border-rose-500/20
                    {% else %}bg-brand-500/10 text-brand-100 border-brand-500/20{% endif %}">
                    <i class="fas mt-0.5 {% if category == 'success' %}fa-check-circle{% elif category == 'error' %}fa-circle-exclamation{% else %}fa-circle-info{% endif %}"></i>
                    <span>{{ message }}</span>
                </div>
                {% endfor %}
            </div>
            {% endif %}
            {% endwith %}
            
            <!-- Form -->
            <form method="POST" class="px-8 pb-8 space-y-5">
                <!-- Username -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Username</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-400 transition-colors">
                            <i class="fas fa-user"></i>
                        </span>
                        <input type="text" name="username" required autofocus
                               class="w-full pl-11 pr-4 py-3.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all shadow-sm"
                               placeholder="Masukkan username">
                    </div>
                </div>
                
                <!-- Password -->
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-2 ml-1">Password</label>
                    <div class="relative group">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-brand-400 transition-colors">
                            <i class="fas fa-lock"></i>
                        </span>
                        <input type="password" name="password" id="password" required
                               class="w-full pl-11 pr-12 py-3.5 bg-slate-800/50 border border-slate-700 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-brand-500/50 focus:border-brand-500 transition-all shadow-sm"
                               placeholder="Masukkan password">
                        <button type="button" onclick="togglePassword()" class="absolute right-4 top-1/2 -translate-y-1/2 text-slate-500 hover:text-slate-300 transition-colors focus:outline-none">
                            <i class="fas fa-eye" id="eyeIcon"></i>
                        </button>
                    </div>
                </div>
                
                <!-- Button -->
                <button type="submit" class="w-full py-3.5 bg-brand-500 hover:bg-brand-400 text-[#0E0F13] font-heading font-extrabold rounded-xl transition-all duration-300 shadow-lg shadow-brand-500/20 transform hover:scale-[1.02] active:scale-[0.98] mt-2">
                    Masuk ke Sistem
                </button>
            </form>
            

        
        <!-- Copyright -->
        <p class="text-center text-slate-500 text-xs mt-8">
            &copy; 2026 {{ app_setting.nama_aplikasi }}. v2.0
        </p>
    </div>
    
    <script>
        function togglePassword() {
            const pwd = document.getElementById('password');
            const icon = document.getElementById('eyeIcon');
            if (pwd.type === 'password') {
                pwd.type = 'text';
                icon.classList.replace('fa-eye', 'fa-eye-slash');
            } else {
                pwd.type = 'password';
                icon.classList.replace('fa-eye-slash', 'fa-eye');
            }
        }
    </script>
</body>
</html>
